            <dialog id="add_dialog">

                    <div>
                        <label for="title">Title</label>

                    </div>
                    <div>
                        <label for="author">Author</label>
                        <input type="text" name="author" id="author" maxlength="50">
                    </div>
                    <div>
                        <label for="pages">Pages</label>
                        <input type="number" name="pages" id="pages" min="1" max="2000">
                    </div>
                    <div class="status">
                        <label for="read">Have you read it?</label>
                        <input type="checkbox" name="read" id="read">
                    </div>
                    <div>
                        <button formmethod="dialog" type="submit">Cancel</button>
                        <button type="submit">Add</button>
                    </div>
                </form>
            </dialog>
        </div>
